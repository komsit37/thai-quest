<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <div class="logo-mark">🪬</div>
      <h1>Thai Quest</h1>
      <p class="subtitle">Adventure of the Magic Amulet</p>
    </header>

    <section id="setup" class="card">
      <h2>Begin your adventure</h2>
      <button id="continueBtn" class="btn-primary" style="display:none;margin-bottom:16px">Continue Adventure ✨</button>
      <label class="field">OpenRouter API key
        <input id="apiKey" type="password" placeholder="sk-or-v1-..." autocomplete="off">
      </label>
      <label class="field">Your name
        <input id="kidName" type="text" placeholder="e.g. Mia" maxlength="20">
      </label>
      <div class="field">
        <span>What do you love?</span>
        <div id="interests" class="chips">
          <button data-interest="dinosaurs">🦖 Dinosaurs</button>
          <button data-interest="space">🚀 Space</button>
          <button data-interest="animals">🐯 Animals</button>
          <button data-interest="magic">✨ Magic</button>
          <button data-interest="soccer">⚽ Soccer</button>
          <button data-interest="art">🎨 Art</button>
          <button data-interest="cooking">🍜 Cooking</button>
          <button data-interest="music">🎵 Music</button>
        </div>
      </div>
      <button id="startBtn" class="btn-primary">Enter the Jungle ✨</button>
      <p id="setupError" class="error" role="alert"></p>
    </section>

    <section id="story" class="story-screen" aria-live="polite">
      <div class="stats">
        <span>Chapter <strong id="statChapter">1</strong></span>
        <span>Words <strong id="statWords">0</strong></span>
        <span>XP <strong id="statXP">0</strong></span>
      </div>
      <div id="storyContent"></div>
    </section>
  </main>
  <script type="module" src="src/app.js"></script>
</body>
</html>
